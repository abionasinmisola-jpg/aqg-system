<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}AQG System{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #131929;
      --surface2: #1c2640;
      --accent: #4f8ef7;
      --accent2: #a78bfa;
      --gold: #f5c542;
      --text: #e8eaf0;
      --muted: #6b7a9d;
      --danger: #f26b6b;
      --success: #4dd98e;
      --border: rgba(255,255,255,0.07);
      --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }
    h1, h2, h3, h4, h5, h6 { font-family: 'Syne', sans-serif; }
    .alert { border: none; border-radius: 10px; font-size: 14px; }
    .alert-success  { background: rgba(77,217,142,.15); color: var(--success); }
    .alert-danger   { background: rgba(242,107,107,.15); color: var(--danger); }
    .alert-warning  { background: rgba(245,197,66,.12); color: var(--gold); }
    .alert-info     { background: rgba(79,142,247,.12); color: var(--accent); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div style="position:fixed;top:1rem;right:1rem;z-index:9999;min-width:280px;max-width:380px;">
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} alert-dismissible fade show shadow-sm mb-2" role="alert">
            {{ msg }}
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
